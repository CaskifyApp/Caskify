name: caskify
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Drenzzz <realdrenzzz@gmail.com>
description: PostgreSQL Manager for Linux
homepage: https://github.com/drenzzz/Caskify
license: MIT

contents:
  - src: ./build/bin/caskify
    dst: /usr/bin/caskify
    file_info:
      mode: 0755
  - src: ./build/linux/caskify.desktop
    dst: /usr/share/applications/caskify.desktop
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/512x512/apps/caskify.png

rpm:
  summary: PostgreSQL Manager for Linux

deb:
  compression: gzip
